<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(8, 4)">
    <path d="M28 2 L52 12 L52 28 C52 42 42 54 28 60 C14 54 4 42 4 28 L4 12 Z"
          fill="url(#shieldGrad)"/>
    <path d="M28 8 L46 16 L46 28 C46 38 38 48 28 52 C18 48 10 38 10 28 L10 16 Z"
          fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Chart line -->
    <path d="M14 38 L22 30 L30 36 L42 22"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 20 L42 22 L40 28"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- TradeGuard text -->
  <text x="72" y="44" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9" letter-spacing="-0.02em">
    <tspan>Trade</tspan><tspan fill="#3b82f6">Guard</tspan>
  </text>

  <!-- AI Badge -->
  <rect x="264" y="22" width="44" height="28" rx="6" fill="url(#greenGrad)"/>
  <text x="286" y="42" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">AI</text>
</svg>